services:
  postgres:
    image: postgres:16-alpine
    container_name: shopmind-postgres
    environment:
      POSTGRES_USER: shopmind
      POSTGRES_PASSWORD: shopmind
      POSTGRES_DB: shopmind
      # 测试用独立 DB,跟 dev 数据隔离
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "5432:5432"
    volumes:
      - shopmind_pg_data:/var/lib/postgresql/data
      - ./scripts/postgres_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopmind -d shopmind"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  shopmind_pg_data:
